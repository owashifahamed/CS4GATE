<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><script src="static-data.js"></script><script src="static-api.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Clone - Reset Password - CS4GATE</title>
    <meta name="description" content="Demo portfolio clone of CS4GATE. Visit https://cs4gate.com/ for the real live website. Set a new CS4GATE account password using your secure reset link.">
<meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css?v=20260531contrast1">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-brand">
      <a class="auth-logo" href="index.html">CS4GATE</a>
      <h1>Choose a new password</h1>
      <p>Use the reset link from your email to update your password.</p>
    </section>
    <section class="auth-card">
      <div class="panel-title"><i class="fas fa-lock"></i><div><h2>Reset Password</h2><p>Enter a new password.</p></div></div>
      <form id="resetForm" class="auth-form">
        <label><span>New Password</span><input id="password" type="password" placeholder="Minimum 6 characters" required></label>
        <label><span>Confirm Password</span><input id="confirmPassword" type="password" placeholder="Repeat password" required></label>
        <div id="authMessage" class="auth-message"></div>
        <button class="btn btn-primary auth-submit" type="submit"><i class="fas fa-save"></i> Update Password</button>
      </form>
      <p class="auth-switch"><a href="signin.html">Back to sign in</a></p>
    </section>
  </main>
  <script src="auth.js?v=20260531contrast1"></script>
</body>
</html>
