<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><script src="static-data.js"></script><script src="static-api.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Clone - Forgot Password - CS4GATE</title>
    <meta name="description" content="Demo portfolio clone of CS4GATE. Visit https://cs4gate.com/ for the real live website. Request a secure CS4GATE password reset link for your account.">
<meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css?v=20260531contrast1">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-brand">
      <a class="auth-logo" href="index.html">CS4GATE</a>
      <h1>Reset your password</h1>
      <p>Enter your account email. If it exists, we will send a reset link.</p>
    </section>
    <section class="auth-card">
      <div class="panel-title"><i class="fas fa-key"></i><div><h2>Forgot Password</h2><p>Reset links expire in 1 hour.</p></div></div>
      <form id="forgotForm" class="auth-form">
        <label><span>Email</span><input id="email" type="email" placeholder="you@example.com" required></label>
        <div id="authMessage" class="auth-message"></div>
        <button class="btn btn-primary auth-submit" type="submit"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
      </form>
      <p class="auth-switch"><a href="signin.html">Back to sign in</a></p>
    </section>
  </main>
  <script src="auth.js?v=20260531contrast1"></script>
</body>
</html>
